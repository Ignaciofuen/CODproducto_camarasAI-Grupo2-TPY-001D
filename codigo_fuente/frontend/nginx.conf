# =============================================================================
# Camaras-IA · nginx config (sirve frontend + reverse-proxy a backend FastAPI)
# =============================================================================
# El frontend hace fetch a rutas relativas (ej. /auth/login, /camaras), nginx
# las reenvía al servicio `backend` del docker-compose (puerto 8000).
#
# MediaMTX está DESHABILITADO acá porque, para la opción "híbrida", MediaMTX
# corre en la PC local del operador, no en Oracle. Si en el futuro lo subís
# a Oracle, descomentar los bloques marcados con [MEDIAMTX].
# =============================================================================

upstream backend_upstream {
    server backend:8000;
}

# [MEDIAMTX] DESCOMENTAR si subis MediaMTX a Oracle:
# upstream mediamtx_hls    { server mediamtx:8888; }
# upstream mediamtx_webrtc { server mediamtx:8889; }

server {
    listen 80;
    server_name _;

    client_max_body_size 200M;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Rutas que van al backend FastAPI
    location ~ ^/(auth|usuarios|camaras|alertas|eventos|estados|health|config|detecciones|grabaciones|snapshots|sistema|analisis|notificaciones)(/|$) {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / WebSocket support
        proxy_set_header Connection        '';
        proxy_buffering                    off;
        proxy_cache                        off;
        proxy_read_timeout                 24h;
        chunked_transfer_encoding          off;
    }

    # [MEDIAMTX] DESCOMENTAR si subis MediaMTX a Oracle:
    # location /hls/ {
    #     rewrite ^/hls/(.*)$ /$1 break;
    #     proxy_pass http://mediamtx_hls;
    #     proxy_buffering off;
    # }
    # location /webrtc/ {
    #     rewrite ^/webrtc/(.*)$ /$1 break;
    #     proxy_pass http://mediamtx_webrtc;
    #     proxy_buffering off;
    # }
}
