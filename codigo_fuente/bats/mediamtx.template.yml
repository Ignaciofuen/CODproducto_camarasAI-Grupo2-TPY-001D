# =============================================================================
# Camaras-IA - MediaMTX template (LOW-LATENCY HLS)
# =============================================================================
# Este es el template que renderiza `_render-mediamtx-yml.ps1`. Los `source:`
# de cada path son placeholders (rtsp://placeholder/<path>) que el script
# reemplaza por la URL real (con IP descubierta por ARP + password del .env).
#
# Para tunear latencia, ver bloque ###### HLS server #######.
# =============================================================================

logLevel: info
logDestinations: [stdout]
logStructured: false
logFile: mediamtx.log
sysLogPrefix: mediamtx
dumpPackets: false

readTimeout: 10s
writeTimeout: 10s
writeQueueSize: 512
udpMaxPayloadSize: 1452
udpReadBufferSize: 0

runOnConnect:
runOnConnectRestart: false
runOnDisconnect:

###############################################
# Authentication

authMethod: internal

authInternalUsers:
- user: any
  pass:
  ips: []
  permissions:
  - action: publish
    path:
  - action: read
    path:
  - action: playback
    path:

- user: any
  pass:
  ips: ['127.0.0.1', '::1']
  permissions:
  - action: api
  - action: metrics
  - action: pprof

authHTTPAddress:
authHTTPFingerprint:
authHTTPExclude:
- action: api
- action: metrics
- action: pprof

authJWTJWKS:
authJWTJWKSFingerprint:
authJWTClaimKey: mediamtx_permissions
authJWTExclude: []
authJWTIssuer:
authJWTAudience:

###############################################
# Control API / Metrics / PPROF / Playback

# API REST de MediaMTX activa en :9997. La usa el backend para recargar
# la config de un path en caliente cuando cambian credenciales desde la UI,
# sin reiniciar el proceso. Solo escuchamos en localhost por seguridad.
api: true
apiAddress: 127.0.0.1:9997
apiEncryption: false
apiServerKey: server.key
apiServerCert: server.crt
apiAllowOrigins: ['*']
apiTrustedProxies: []

metrics: false
metricsAddress: :9998
metricsEncryption: false
metricsServerKey: server.key
metricsServerCert: server.crt
metricsAllowOrigins: ['*']
metricsTrustedProxies: []

pprof: false
pprofAddress: :9999
pprofEncryption: false
pprofServerKey: server.key
pprofServerCert: server.crt
pprofAllowOrigins: ['*']
pprofTrustedProxies: []

playback: false
playbackAddress: :9996
playbackEncryption: false
playbackServerKey: server.key
playbackServerCert: server.crt
playbackAllowOrigins: ['*']
playbackTrustedProxies: []

###############################################
# RTSP server

rtsp: true
rtspTransports: [udp, multicast, tcp]
rtspEncryption: "no"
rtspAddress: :8554
rtspsAddress: :8322
rtpAddress: :8000
rtcpAddress: :8001
multicastIPRange: 224.1.0.0/16
multicastRTPPort: 8002
multicastRTCPPort: 8003
srtpAddress: :8004
srtcpAddress: :8005
multicastSRTPPort: 8006
multicastSRTCPPort: 8007
rtspServerKey: server.key
rtspServerCert: server.crt
rtspAuthMethods: [basic]

###############################################
# RTMP server

rtmp: true
rtmpEncryption: "no"
rtmpAddress: :1935
rtmpsAddress: :1936
rtmpServerKey: server.key
rtmpServerCert: server.crt

###############################################
# HLS server  -- LOW LATENCY TUNING ----------
#
# La latencia HLS aproximada =  hlsSegmentCount * hlsSegmentDuration.
# Con los valores de abajo: 3 * 500ms = ~1.5s mas el round-trip.
# Si la red de la LAN se entrecorta, subi hlsSegmentCount a 4 o 5.
###############################################

hls: true
hlsAddress: :8888
hlsEncryption: false
hlsServerKey: server.key
hlsServerCert: server.crt
hlsAllowOrigins: ['*']
hlsTrustedProxies: []
# Pre-arma el HLS desde el arranque para que el primer cliente
# reproduzca instantaneo (no espera ~3-5s de armado on-demand).
hlsAlwaysRemux: true
# IMPORTANTE: 'lowLatency' (LL-HLS) EXIGE hlsSegmentCount >= 7 por spec.
# Si lo bajas a 3, MediaMTX destruye el muxer con:
#   "Low-Latency HLS requires at least 7 segments"
# y todos los GET /index.m3u8 devuelven 500.
#
# Usamos 'fmp4' (HLS moderno, mismo contenedor que LL pero sin la
# restriccion de 7 segments). Latencia practica ~ similar a LL en LAN.
hlsVariant: lowLatency
# Buffer minimo en el muxer. Con fmp4 podemos bajar libremente.
# Latencia teorica = hlsSegmentCount * hlsSegmentDuration = 3 * 1s = ~3s.
hlsSegmentCount: 7
# >= GOP/keyframe-period de la camara (las IP cams mandan IDR cada 1-2s).
hlsSegmentDuration: 1s
# hlsPartDuration solo aplica a 'lowLatency'; con fmp4 se ignora pero
# lo dejamos seteado por si en el futuro volvemos a LL.
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsDirectory: ''
hlsMuxerCloseAfter: 60s
hlsCDNSecret: ''

###############################################
# WebRTC / SRT (no se usan, defaults)

webrtc: true
webrtcAddress: :8889
webrtcEncryption: false
webrtcServerKey: server.key
webrtcServerCert: server.crt
webrtcAllowOrigins: ['*']
webrtcTrustedProxies: []
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: ''
webrtcIPsFromInterfaces: true
webrtcIPsFromInterfacesList: []
webrtcAdditionalHosts: []
webrtcICEServers2: []
webrtcSTUNGatherTimeout: 5s
webrtcHandshakeTimeout: 10s
webrtcTrackGatherTimeout: 2s

srt: true
srtAddress: :8890

###############################################
# Default path settings

pathDefaults:
  source: publisher
  sourceFingerprint:
  sourceOnDemand: false
  sourceOnDemandStartTimeout: 10s
  sourceOnDemandCloseAfter: 10s
  maxReaders: 0
  srtReadPassphrase:
  useAbsoluteTimestamp: false

  alwaysAvailable: false
  alwaysAvailableTracks: []
  alwaysAvailableFile: ''

  record: false
  recordPath: ./recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordPartDuration: 1s
  recordMaxPartSize: 50M
  recordSegmentDuration: 1h
  recordDeleteAfter: 1d

  overridePublisher: true
  srtPublishPassphrase:
  rtspDemuxMpegts: false

  rtspTransport: automatic
  rtspAnyPort: false
  rtspRangeType:
  rtspRangeStart:
  rtspUDPSourcePortRange: [10000, 65535]

  rtpSDP:

  whepBearerToken: ''
  whepSTUNGatherTimeout: 5s
  whepHandshakeTimeout: 10s
  whepTrackGatherTimeout: 2s

  sourceRedirect:

  rpiCameraCamID: 0
  rpiCameraSecondary: false
  rpiCameraWidth: 1920
  rpiCameraHeight: 1080
  rpiCameraHFlip: false
  rpiCameraVFlip: false
  rpiCameraBrightness: 0
  rpiCameraContrast: 1
  rpiCameraSaturation: 1
  rpiCameraSharpness: 1
  rpiCameraExposure: normal
  rpiCameraAWB: auto
  rpiCameraAWBGains: [0, 0]
  rpiCameraDenoise: "off"
  rpiCameraShutter: 0
  rpiCameraMetering: centre
  rpiCameraGain: 0
  rpiCameraEV: 0
  rpiCameraROI:
  rpiCameraHDR: false
  rpiCameraTuningFile:
  rpiCameraMode:
  rpiCameraFPS: 30
  rpiCameraAfMode: continuous
  rpiCameraAfRange: normal
  rpiCameraAfSpeed: normal
  rpiCameraLensPosition: 0.0
  rpiCameraAfWindow:
  rpiCameraFlickerPeriod: 0
  rpiCameraTextOverlayEnable: false
  rpiCameraTextOverlay: '%Y-%m-%d %H:%M:%S - MediaMTX'
  rpiCameraCodec: auto
  rpiCameraIDRPeriod: 60
  rpiCameraBitrate: 5000000
  rpiCameraHardwareH264Profile: main
  rpiCameraHardwareH264Level: '4.1'
  rpiCameraSoftwareH264Profile: baseline
  rpiCameraSoftwareH264Level: '4.1'
  rpiCameraMJPEGQuality: 60

  runOnInit:
  runOnInitRestart: false
  runOnDemand:
  runOnDemandRestart: false
  runOnDemandStartTimeout: 10s
  runOnDemandCloseAfter: 10s
  runOnUnDemand:
  runOnReady:
  runOnReadyRestart: false
  runOnNotReady:
  runOnRead:
  runOnReadRestart: false
  runOnUnread:
  runOnRecordSegmentCreate:
  runOnRecordSegmentComplete:

###############################################
# Path settings - Camaras-IA
###############################################
# Los `source:` son placeholders. Las URLs reales las inyecta
# `_render-mediamtx-yml.ps1` leyendo el JSON de discover_camera_ips.py.
#
# rtspTransport: tcp -> evita perdida de paquetes en RTSP UDP.
# sourceOnDemand: yes -> MediaMTX se conecta a la camara solo cuando hay
# clientes leyendo (frontend abierto o detector consumiendo).
###############################################
paths:

  cam_principal:
    source:                     rtsp://placeholder/cam_principal
    sourceOnDemand:             yes
    sourceOnDemandStartTimeout: 5s
    sourceOnDemandCloseAfter:   30s
    rtspTransport:              tcp

  # ---------------------------------------------------------------------------
  # cam_principal_lite — sub-stream "casero" via FFmpeg
  # ---------------------------------------------------------------------------
  # Si la camara NO expone un sub-stream RTSP nativo, este path crea uno:
  # toma el cam_principal (1080p) de MediaMTX, lo reescala a 720p con FFmpeg
  # y lo republica internamente en cam_principal_lite. Frontend y detector
  # consumen este path liviano.
  #
  # Para activarlo:
  #   1. Tener ffmpeg.exe en el PATH (probar `ffmpeg -version` en cmd).
  #   2. Cambiar mediamtx_path de Camara_Principal en la DB:
  #        UPDATE camaras SET mediamtx_path='cam_principal_lite'
  #         WHERE nombre='Camara_Principal';
  #   3. Reiniciar bats\start-mediamtx.bat y el detector.
  #
  # Costo: ~10-15% CPU del server por una rescalacion 1080->720 con
  # libx264 ultrafast tune zerolatency.
  # ---------------------------------------------------------------------------
  cam_principal_lite:
    source:                     publisher
    # FFmpeg ultra low-latency: sin bufsize, sin reencode B-frames, GOP corto.
    # -fflags nobuffer + -flags low_delay quitan los buffers internos.
    # -tune zerolatency desactiva look-ahead. -g 12 = keyframe cada 0.5s
    # (a 25fps) para que el primer frame visible aparezca rapido.
    # -bf 0 sin B-frames, -profile:v baseline para latencia minima.
    # NVENC + scaling en GPU. Todo el pipeline corre en hardware NVIDIA:
    #   1. -hwaccel cuda + -hwaccel_output_format cuda -> el decoder H264
    #      del stream RTSP corre en GPU y deja los frames en VRAM (no copia
    #      a RAM ni hace decode por CPU).
    #   2. -vf scale_cuda=-2:720 -> el rescale 1080p->720p tambien en GPU.
    #   3. -c:v h264_nvenc -> encoder NVENC en GPU.
    #
    # Resultado: ~3-5% GPU, latencia transcoding ~100-150ms (vs ~500ms con
    # libx264 por CPU). Total estimado: ~300ms cliente->camara.
    #
    # Si NVENC tira error "no NVIDIA devices available", la PC no tiene
    # driver de GPU corriendo o la tarjeta no soporta NVENC. Fallback:
    # volver a -c:v libx264 -preset ultrafast (todo CPU).
    # libx264 (CPU). La PC no tiene GPU NVIDIA -> NVENC no esta disponible.
    # Costo: ~10-15% CPU, latencia ~400ms del transcoding.
    runOnDemand: >
      ffmpeg -hide_banner -loglevel warning
      -fflags +genpts+discardcorrupt
      -rtsp_transport tcp
      -thread_queue_size 1024
      -i rtsp://localhost:8554/cam_principal
      -vf scale=-2:720
      -c:v libx264 -preset ultrafast -tune zerolatency
      -profile:v baseline -bf 0 -g 25 -keyint_min 25
      -crf 26
      -an
      -f rtsp rtsp://localhost:8554/cam_principal_lite
    runOnDemandRestart:         yes
    runOnDemandStartTimeout:    10s
    runOnDemandCloseAfter:      30s

  cam_sonoff:
    source:                     rtsp://placeholder/cam_sonoff
    sourceOnDemand:             no
    rtspTransport:              tcp

  all_others:
